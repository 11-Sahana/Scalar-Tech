name: supply-disruption-env
version: "1.0.0"
description: >
  OpenEnv supply chain disruption RL environment. A primary supplier has
  failed and an AI agent must decide which orders to fulfil, delay, or cancel
  and which alternative supplier to engage — under inventory, deadline, and
  budget constraints.

tags:
  - supply-chain
  - decision-making
  - operations-research

environment:
  module: server.app
  app: app

tasks:
  - id: easy
    description: >
      Given the disruption event and current inventory levels, identify which
      customer orders are at risk of not being fulfilled on time.
    grader: app.grader.grade_easy
    max_steps: 10

  - id: medium
    description: >
      Given the alternative suppliers and the total units required, rank the
      non-disrupted suppliers from best to worst choice.
    grader: app.grader.grade_medium
    max_steps: 15

  - id: hard
    description: >
      Produce a complete contingency plan specifying which orders to fulfil,
      delay, or cancel, and which supplier to engage.
    grader: app.grader.grade_hard
    max_steps: 20