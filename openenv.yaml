name: supply-disruption-env
version: "1.0.0"
description: >
  OpenEnv supply chain disruption RL environment. A primary supplier has
  failed and an AI agent must decide which orders to fulfil, delay, or cancel
  and which alternative supplier to engage — under inventory, deadline, and
  budget constraints.

tags:
  - supply-chain
  - decision-making
  - operations-research

environment:
  module: server.app
  app: app

tasks:
  - id: easy
    name: At-Risk Order Identification
    difficulty: easy
    grader: app.grader.grade_easy

  - id: medium
    name: Supplier Ranking
    difficulty: medium
    grader: app.grader.grade_medium

  - id: hard
    name: Full Contingency Plan
    difficulty: hard
    grader: app.grader.grade_hard